<script src="_framework/blazor.webassembly.958z1vx7fr.js" autostart="false"></script>
    <script>
        Blazor.start({
            loadBootResource: function (type, name, defaultUri, integrity) {
                const resources = {
                    "dotnet.js": "_framework/dotnet.e0vr9exqce.js",
                    "dotnet.native.wasm": "_framework/dotnet.native.f749u69f30.wasm",
                    "dotnet.native.js": "_framework/dotnet.native.rjbmzc4jpg.js",
                    "dotnet.runtime.js": "_framework/dotnet.runtime.r2kbxkuujc.js"

                if (resources[name]) return resources[name];
                return defaultUri.replace(/\.br$/, '').replace(/\.gz$/, '');
            }
        });

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

      <script>
        window.initMobileSequentialReveal = function () {
        if (window.innerWidth > 767) return;

        const cards = document.querySelectorAll('.mobile-stack .col-12');

        window.addEventListener('scroll', () => {
        cards.forEach((card) => {
        const cardTop = card.getBoundingClientRect().top;
        const cardHeight = card.offsetHeight;

        // لو عدينا ربع الكارت
        if (cardTop < -(cardHeight * 0.25)) {
        card.classList.add('is-faded'); // الزغللة والشفافية
        }
        // لو لسه في نص الشاشة
        else if (cardTop < window.innerHeight * 0.8) {
        card.classList.remove('is-faded');
        }
        });
        });
        };
        window.startTestimonialsCarousel = function () {
        var myCarousel = document.getElementById('testimonialsCarousel');
        if (myCarousel) {
        // بنستخدم الطريقة الأحدث والأضمن في بوتستراب 5
        var carousel = bootstrap.Carousel.getOrCreateInstance(myCarousel, {
        interval: 4000,
        ride: 'carousel',
        pause: 'hover' // ميزة إضافية: يقف لو العميل حط الماوس عليه عشان يقرأ
        });
        carousel.cycle();
        console.log("Carousel Started Successfully!");
        } else {
        console.log("Carousel element not found!");
        }
        };   
        window.initScrollAnimations = () => {
        const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
        // لو السيكشن ظهر قدام عين المستخدم في الشاشة
        if (entry.isIntersecting) {
        // حط كلاسات الأنميشن علشان يشتغل فوراً
        entry.target.classList.add('animate__animated', 'animate__fadeInUp');
        entry.target.style.opacity = '1';

        // قوله خلاص وقف مراقبة للسيكشن ده لأنه ظهر ومفيش داعي نراحبه تاني
        observer.unobserve(entry.target);
        }
        });
        }, { threshold: 0.15 }); // يشتغل لما يظهر 15% من السيكشن

        // راقب أي عنصر واخد كلاس اسمه reveal-on-scroll
        document.querySelectorAll('.reveal-on-scroll').forEach(el => {
        observer.observe(el);
        });
        };
        window.initScrollAnimationss = () => {
        const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
        // لو السيكشن دخل في نطاق الرؤية (ولو بنسبة 15%)
        if (entry.isIntersecting) {
        // اظهر السيكشن بناء على الـ pattern بتاعك
        entry.target.style.opacity = '1';

        // لقط كل العناصر اللي جوا السيكشن وعايزة تاخد أنميشن
        const animatedElements = entry.target.querySelectorAll('[data-animate]');
        animatedElements.forEach(el => {
        const animationClass = el.getAttribute('data-animate');
        // ضيف كلاسات الانميشن فوراً
        el.className += ` ${animationClass}`;
        });

        // فك المراقبة عن السيكشن ده عشان الأنميشن يشتغل مرة واحدة بس وميقعدش يعيد نفسه
        observer.unobserve(entry.target);
        }
        });
        }, { threshold: 0.50 }); // 0.15 يعني يشتغل أول ما 15% من السيكشن يظهر

        // مراقبة أي عنصر واخد كلاس reveal-on-scroll
        document.querySelectorAll('.reveal-on-scrolls').forEach(section => {
        observer.observe(section);
        });
        };
    </script>
    <script>
    function closeNavbar() {
        var navbar = document.getElementById('mainNavbar');
        if (navbar.classList.contains('show')) {
            // إغلاق قائمة بوتستراب
            var bsCollapse = new bootstrap.Collapse(navbar, { toggle: true });
            bsCollapse.hide();
        }
    }
</script>
